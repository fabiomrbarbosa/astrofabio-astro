hero:
  heading:
    - Olhe para a sua vida
    - pelo espelho do céu.
  subheading: A astrologia descreve a sua vida e as circunstâncias em que se move, permitindo compreendê-las com clareza e agir com maior consciência.
  ctaHref: "#book"
  ctaSecondaryHref: "/pt/consultas"

intro:
  heading: Porquê a Astrologia?
  paragraphs:
    - Ao longo de milénios, a Astrologia foi considerada uma das principais bases do nosso conhecimento do mundo natural. É uma arte com uma longa tradição e uma capacidade notável de descrever aquilo que nos caracteriza e as circunstâncias em que vivemos, os ciclos que atravessamos e os momentos mais propícios para agir.
    - A Astrologia é para todas as pessoas em qualquer fase da vida. Quer deseje entender melhor as suas condições presentes e futuras ou as dinâmicas interpessoais num dado relacionamento, quer procure atravessar da melhor forma um momento-chave na sua vida, uma consulta astrológica pode ajudar a clarificar a sua perspectiva. A decisão final em qualquer assunto é sempre sua.
    - Aqui encontrará uma prática astrológica baseada em métodos tradicionais, segundo um sistema aprendido e praticado com seriedade. A minha intenção é que se reconcilie com o seu próprio potencial e saiba mover-se com maior clareza dentro das condições de cada momento.
