hero:
  heading:
    - Olhe para a sua vida
    - pelo espelho do céu.
  subheading: Com a Astrologia tradicional, poderá compreender melhor quem é e avaliar que caminhos tem à sua frente.
  cta: Marcar consulta
  ctaHref: "mailto:fabio@astrofabio.com"
  ctaSecondary: Saber mais
  ctaSecondaryHref: "#"

intro:
  paragraphs:
    - Ao longo de milénios, a astrologia foi considerada uma das principais bases do nosso conhecimento do mundo natural. É uma arte com uma longa tradição e uma capacidade notável de descrever aquilo que nos caracteriza e as circunstâncias em que vivemos, os ciclos que atravessamos e os momentos mais propícios para agir.
    - Aqui encontrará uma prática astrológica baseada em métodos tradicionais. O ponto de partida é sempre o seu mapa natal, estudado com atenção e rigor, segundo um sistema estruturado, aprendido e praticado com seriedade. A minha intenção é que se reconcilie com a sua própria natureza e saiba mover-se com maior clareza dentro das condições de cada momento.

bio:
  heading: Quem sou eu
  paragraphs:
    - 'Comecei a estudar astrologia tradicional formalmente em 2023, na <a href="https://academiadeastrologia.com/">Academia de Estudos Astrológicos</a>. Em paralelo, trabalho como <a href="https://fabiobarbosa.com">web developer e copywriter</a>, dois outros ofícios que também caminham na fronteira entre a arte e o método.'
    - "O que me trouxe à astrologia foi a convicção de que o cosmos é algo vivo e inteligível, não um pano de fundo inerte, e que vale a pena aprender a lê-lo. A astrologia tradicional oferece exactamente isso: um sistema completo, com a sua própria lógica e metodologia, capaz de descrever quem somos, o que nos rodeia e o tempo que atravessamos."
    - Considero que o seu mapa natal é um instrumento de navegação, não uma sentença. Nas nossas conversas, espero ser capaz de fazer uma delineação que respeite na íntegra a sua história pessoal, e o ajude a seguir o seu caminho de forma mais serena.
    - Se chegou aqui com curiosidade genuína sobre o que o seu mapa tem para lhe dizer, está no lugar certo.

consultation:
  heading: Marcar consulta
  advisory:
    - Uma consulta tem a duração aproximada de noventa minutos e começa com o seu mapa natal. Podemos também observar os ciclos planetários actuais e qualquer questão ou área da vida que deseje explorar.
    - Para marcar, preencha o formulário e entrarei em contacto em alguns dias para confirmar um horário.
