intro:
  heading: Why Astrology?
  paragraphs:
    - Over millennia, astrology has been regarded as one of the principal foundations of our knowledge of the natural world. It is an art with a long tradition and a remarkable capacity to describe what characterises us and the circumstances in which we live, the cycles we move through, and the moments most suited for action.
    - Astrology is for everyone, at any stage of life. Whether you want to better understand your present and future conditions or the interpersonal dynamics in a given relationship, or whether you are looking to navigate a key moment in your life as well as possible, an astrology consultation can help clarify your perspective. The final decision in any matter is always yours.
    - Here you will find an astrology practice based on traditional methods, according to a system learned and practised with seriousness. My intention is that you come to terms with your own potential and learn to move with greater clarity within the conditions of each passing moment.
