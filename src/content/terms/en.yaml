hero:
  heading: Terms & Conditions

sections:
  - heading: 1. About these terms
    paragraphs:
      - These terms govern the use of the services offered through this website by Fábio Barbosa, astrologer. By booking a consultation, you confirm that you have read, understood, and accepted these terms in full.
      - These terms may be updated from time to time. The version published on this page at the time of booking applies.

  - heading: 2. Nature of the service
    paragraphs:
      - The consultations offered by the astrologer consist of readings based on traditional methods. They draw on planetary symbolism and cycles as a tool for reflection and self-understanding.
      - Astrology is not recognised as a science in the academic sense, and these sessions are not a substitute for professional medical, psychological, psychiatric, legal, financial, or any other regulated advice. Nothing communicated during a consultation should be understood as a diagnosis, prognosis, or binding recommendation.
      - The astrologer reserves the right to decline consultations about third parties or others of an ethically dubious nature.
      - The interpretations and observations shared during a session are offered in good faith as a starting point for reflection. The astrologer makes no claim of predicting the future with certainty, and no guarantee is given that any particular outcome will or will not occur.
      - In accordance with the law, it is hereby stated that interpretations by the astrologer are intended exclusively for entertainment purposes.
      - Each person is responsible for the decisions they make in their own life. The astrologer accepts no liability for actions taken or not taken based on anything communicated during a consultation.

  - heading: 3. Eligibility
    paragraphs:
      - You must be at least 18 years old to book a consultation. By booking, you confirm that you are of legal age.

  - heading: 4. Bookings and payments
    paragraphs:
      - Consultations are confirmed only upon receipt of full payment. You will receive a confirmation by email after payment is processed.
      - Prices are stated in Euros and include any applicable taxes. Payment is made through IBAN bank transfer, PayPal or MB Way.

  - heading: 5. Cancellations and rescheduling
    paragraphs:
      - If you need to cancel or reschedule, please do so at least 48 hours before your scheduled session. Cancellations made with sufficient notice are eligible for a full refund or rescheduling at no extra cost.
      - Cancellations made less than 48 hours before the session, or no-shows, are not eligible for a refund. Exceptions may be considered in cases of genuine emergency, at the astrologer's discretion.
      - If the astrologer needs to cancel or reschedule a session, you will be offered an alternative time or a full refund.

  - heading: 6. Confidentiality
    paragraphs:
      - All personal information you share — including birth data and anything discussed during the session — is treated with full confidentiality. It will not be shared with third parties.
      - Session notes and chart data are retained solely for the purpose of delivering and following up on the consultation. You may request deletion of your data at any time by contacting <a href="mailto:fabio@astrofabio.com">fabio@astrofabio.com</a>.

  - heading: 7. Intellectual property
    paragraphs:
      - All written materials, recordings, and charts produced as part of a consultation are for your personal use only. They may not be reproduced, shared publicly, or used commercially without prior written consent.

  - heading: 8. Contact
    paragraphs:
      - For any questions regarding these terms, you can reach out at <a href="mailto:fabio@astrofabio.com">fabio@astrofabio.com</a>.
