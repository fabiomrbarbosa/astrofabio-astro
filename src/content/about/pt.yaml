hero:
  heading: Sobre

bio:
  paragraphs:
    - "Cresci nos Açores. Mais tarde mudei-me para o continente, estudei Jornalismo, passei algum tempo no rádio FM e acabei por enveredar pelo web development e pelo copywriting. São os dois ofícios que ainda pratico a par da astrologia, e a semelhança de família não é acidental: os três vivem algures entre a estrutura e o sentido."
    - "O caminho até à astrologia não foi curto. Passei anos a explorar o Paganismo e a filosofia hermética, encontrando aí coisas que importaram, antes de a astrologia tradicional me oferecer algo que não havia encontrado bem da mesma forma: um sistema completo e coerente, com a sua própria lógica interna, enraizado numa visão do mundo em que o cosmos é vivo e legível. Pareceu-me menos uma descoberta do que um reconhecimento."
    - 'Comecei a estudar formalmente em 2023, na <a href="https://academiadeastrologia.com/">Academia de Estudos Astrológicos</a>. A metodologia importa: o rigor, a coerência interna, a longa tradição de pessoas a pensar cuidadosamente sobre os mesmos problemas. Mas o que sustenta a prática é a convicção de fundo de que a correspondência entre o céu e a terra é real e vale a pena ler.'
    - "A minha própria vida deu-me uma educação razoável em dificuldade, e não chego a este trabalho de um lugar de distância. O que procuro trazer às nossas conversas é atenção genuína e uma recusa em simplificar. Um mapa natal é o mapa de uma vida específica e singular, e tento lê-lo como tal."
    - "Quando não estou no mapa, é provável que esteja a ouvir música, a tricotar, ou às voltas com um livro que está a demorar mais do que esperava a acabar."

cta:
  heading: Marcar consulta
  body: Uma consulta tem a duração aproximada de noventa minutos e começa com o seu mapa natal. Podemos também observar os ciclos planetários actuais e qualquer questão ou área da vida que deseje explorar. Para marcar, preencha o formulário e entrarei em contacto em alguns dias para confirmar um horário.
  href: /pt/consultas#book
