hero:
  heading: Sobre mim

bio:
  paragraphs:
    - "Chamo-me Fábio Barbosa e pratico Astrologia Tradicional, isto é, a corrente astrológica em vigor no Ocidente entre o período helenístico e o final do século XVII, herdeira das civilizações babilónica, grega, persa, árabe e europeia medieval."
    - 'Comecei a estudar Astrologia formalmente em 2023, na <a href="https://academiadeastrologia.com/">Academia de Estudos Astrológicos</a>. Em paralelo, trabalho como <a href="https://fabiobarbosa.com">web developer e copywriter</a>, dois outros ofícios que também caminham na fronteira entre a arte e o método.'
    - "O que me trouxe à Astrologia foi a convicção de que o cosmos é algo vivo e inteligível, não um pano de fundo inerte, e que vale a pena aprender a lê-lo. A Tradição Astrológica oferece exactamente isso: um sistema completo, com a sua própria lógica e metodologia, capaz de descrever quem somos, o que nos rodeia e o tempo que atravessamos."
    - Considero que o seu mapa natal é um instrumento de navegação que nos permite identificar a cada instante as opções ao nosso dispor que melhor se alinham com a nossa natureza. Nas nossas conversas, tenciono ajudá-lo a fazer essa descoberta passo a passo, integrando-a com a sua história pessoal, de forma a que possa seguir o seu caminho de forma mais confiante e serena.
    - Atendendo à minha própria experiência, desejo que este seja um espaço particularmente seguro e afirmativo para todas as pessoas queer e neurodivergentes que tenham interesse na Astrologia e no que os astros têm para lhes dizer.
