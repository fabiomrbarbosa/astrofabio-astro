hero:
  heading: About

bio:
  paragraphs:
    - "I was born and grew up in the Azores. I later moved to the mainland, studied Journalism, spent some time in FM radio, and eventually made my way into web development and copywriting. Those two are the trades I still practise alongside astrology, and the family resemblance is not accidental: all three live somewhere between structure and meaning."
    - "The road to astrology was not a short one. I spent years exploring Paganism and Hermetic philosophy, finding things there that mattered, before traditional astrology offered something I had not found in quite the same form: a complete and coherent system, with its own internal logic, rooted in a worldview where the cosmos is alive and readable. It felt less like a discovery than a recognition."
    - 'I began studying formally in 2023, at the <a href="https://academyofastrology.eu/">Academy of Traditional Astrology</a>. The methodology matters: the rigour, the internal consistency, the long tradition of people thinking carefully about the same problems. But what sustains the practice is the underlying conviction that the correspondence between sky and earth is real and worth reading.'
    - "My own life has made me acquainted with trauma, and I do not come to this work from a place of detachment. What I try to bring to our conversations is genuine attention and a refusal to simplify. A birth chart is a map of a specific, singular life, and I try to read it accordingly."
    - "When I am not in the chart, I am probably listening to music, crocheting, or sitting with a book that is taking me longer than expected to finish."

cta:
  heading: Book a consultation
  body: A consultation lasts approximately ninety minutes and begins with your natal chart. We may also look at current planetary cycles and any specific question or area of life you wish to explore. To book, simply fill in the form and I will be in touch within a few days to confirm a time.
  href: /consultations#book
