hero:
  heading: About me

bio:
  paragraphs:
    - "My name is Fábio Barbosa and I practise traditional astrology. That is, the form practised in the West between the Hellenistic period and the end of the seventeenth century, heir to the Babylonian, Greek, Persian, Arabic and medieval European civilisations."
    - 'I began studying astrology formally in 2023, at the <a href="https://academyofastrology.eu/">Academy of Traditional Astrology</a>. In parallel, I also work as a <a href="https://fabiobarbosa.com">web developer and copywriter</a>, two other trades that walk the line between art and method.'
    - "What drew me to astrology was the conviction that the cosmos is alive and intelligible, not an inert backdrop, and that it is worth learning to read it. Traditional astrology offers exactly that: a complete system with its own logic and methodology, capable of describing who we are, what surrounds us, and the time we move through."
    - "I consider your birth chart a navigational instrument, one that allows us to identify at every moment the options available to us that best align with our nature. In our conversations, I intend to help you make that discovery step by step, weaving it into your personal history, so that you may follow your path with greater confidence and serenity."
    - Drawing on my own experience, I want this to be a particularly safe and affirming space for all queer and neurodivergent people with an interest in astrology and in what the stars have to share.
