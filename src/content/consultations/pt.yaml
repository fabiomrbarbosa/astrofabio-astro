hero:
  heading: Consultas
  lead: "Uma consulta astrológica permite compreender a própria vida ou uma determinada situação com clareza. Consoante o assunto em questão, aplicam-se diferentes técnicas para esclarecer as suas circunstâncias e indicar possíveis direcções a seguir."

types:
  - id: natal
    discipline: Astrologia Natal
    title: Estudo do mapa natal
    price: 90
    paragraphs:
      - "O seu mapa natal é uma representação do céu no momento em que nasceu, e portanto, das condições em que veio ao mundo. Descreve não só a sua personalidade, mas também as circunstâncias que o moldam, como a sua família, os seus relacionamentos, o seu trabalho ou o seu potencial de prosperidade."
      - "O objectivo desta sessão é dar-lhe uma compreensão clara da estrutura da sua vida, para que possa reconhecer melhor as suas circunstâncias e agir com maior consciência dentro delas."
      - "<strong>Para esta análise, necessito da data, hora e local do seu nascimento.</strong> Peço que seja o mais preciso possível, ou que me informe de antemão caso esteja em dúvida quanto à hora em que nasceu."

  - id: natal-solar-return
    highlight: true
    discipline: Astrologia Natal + Técnicas Preditivas
    title: Estudo do mapa natal e do ano em curso
    price: 120
    paragraphs:
      - "O seu mapa natal descreve a estrutura da sua vida. Contudo, essa estrutura não é estática: ao longo do tempo, diferentes temas são activados, trazendo certas áreas para o primeiro plano enquanto outras se tornam menos relevantes."
      - "<strong>Esta consulta articula o mapa natal com o momento presente.</strong> Para isso, recorro a técnicas tradicionais de previsão para compreender o que está em curso e o que tende a desenvolver-se nos próximos tempos."
      - "O objectivo é dar-lhe uma imagem clara da fase em que se encontra, para que possa orientar-se com maior lucidez nas decisões que tem pela frente."
      - "Este estudo é geralmente feito por altura do aniversário, mas pode ser realizado em qualquer momento do ano."

  - id: horary
    discipline: Astrologia Horária
    title: Questão específica
    price: 60
    paragraphs:
      - A astrologia horária responde a questões concretas sobre situações que o afectam no momento presente.
      - "Levantarei um mapa para o instante em que compreender devidamente a sua pergunta. Caso precise de mais contexto, entrarei em contacto antes de prosseguir. Uma pergunta bem formulada é essencial para um mapa válido."
      - "<strong>Reservo o direito de não responder a questões que considere eticamente dúbias. Não faço diagnósticos médicos nem presto aconselhamento financeiro ou jurídico.</strong> Em qualquer situação crítica, recomendo que recorra também aos especialistas relevantes, de modo a poder tomar uma decisão plenamente informada."

  - id: elective
    discipline: Astrologia Electiva
    title: Eleição de um momento
    price: 80
    paragraphs:
      - Nem todos os momentos oferecem as mesmas condições para agir. A astrologia electiva permite identificar os momentos mais favoráveis para determinados empreendimentos, como por exemplo a assinatura de um contrato, o lançamento de um negócio ou uma viagem.
      - "Para tal, peço-lhe que me indique um período realista dentro do qual pretende pôr em prática os seus planos. Quanto mais específico for o intervalo, melhor. Os seus dados de nascimento são também tidos em conta nesta análise."
      - "<strong>Uma eleição astrológica não é garantia absoluta de sucesso.</strong> O objectivo é maximizar as oportunidades disponíveis, segundo as configurações do momento e do seu próprio mapa natal."

  - id: synastry
    discipline: Sinastria
    title: Estudo das relações
    price: 140
    paragraphs:
      - "A sinastria analisa a relação entre duas pessoas — parceiros amorosos, familiares, amigos ou colegas — através da comparação dos seus mapas natais."
      - "Este estudo permite compreender como cada pessoa tende a viver a relação: onde há facilidade e afinidade, onde podem surgir tensões, e que dinâmicas se estabelecem entre ambos."
      - "O objectivo não é promover confronto, mas sim uma compreensão mais clara da relação que permita cuidar dela com maior consciência."
      - "Para esta consulta, <strong>é fundamental que ambos os participantes estejam presentes e dêem o seu pleno consentimento</strong>."
