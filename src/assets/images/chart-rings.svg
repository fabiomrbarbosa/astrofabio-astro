<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <circle cx="300" cy="300" r="290"      stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="300" cy="300" r="242"    stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="300" r="215.29" stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="300" r="188.57" stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="300" r="161.86" stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="300" r="135.14" stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="300" r="108.43" stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="300" r="81.71"  stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="300" r="55"     stroke="#ffffff" stroke-width="1"/>

  <!-- Classical planets in their domicile signs (thrones). Astronomicon: Q=Sun R=Moon S=Mercury T=Venus U=Mars V=Jupiter W=Saturn -->
  <!-- Signs run counter-clockwise from Cancer at 9 o'clock (255°). Glyphs flipped so baseline faces outward. -->
  <g transform="rotate(255, 300, 300)">
    <text x="300" y="231.65" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="22" font-family="Astronomicon" transform="rotate(180, 300, 231.65)">R</text>
  </g>
  <g transform="rotate(225, 300, 300)">
    <text x="300" y="151.5"  text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="22" font-family="Astronomicon" transform="rotate(180, 300, 151.5)">Q</text>
  </g>
  <g transform="rotate(195, 300, 300)">
    <text x="300" y="204.93" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="22" font-family="Astronomicon" transform="rotate(180, 300, 204.93)">S</text>
  </g>
  <g transform="rotate(165, 300, 300)">
    <text x="300" y="178.22" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="22" font-family="Astronomicon" transform="rotate(180, 300, 178.22)">T</text>
  </g>
  <g transform="rotate(135, 300, 300)">
    <text x="300" y="124.79" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="22" font-family="Astronomicon" transform="rotate(180, 300, 124.79)">U</text>
  </g>
  <g transform="rotate(105, 300, 300)">
    <text x="300" y="98.07"  text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="22" font-family="Astronomicon" transform="rotate(180, 300, 98.07)">V</text>
  </g>
  <g transform="rotate(75, 300, 300)">
    <text x="300" y="71.36"  text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="22" font-family="Astronomicon" transform="rotate(180, 300, 71.36)">W</text>
  </g>
</svg>
